# ── HEAVY / jorasite — http-level config ─────────────────────
# Installed to: /etc/nginx/conf.d/jorasite-http.conf
# Holds settings that must live in the http{} context (real_ip,
# maps, rate-limit zones). The site server{} block is separate.

# TLS terminates on the Keenetic router; it reverse-proxies to us
# from the LAN. Trust it so access logs show the real client IP.
set_real_ip_from 192.168.2.0/24;
real_ip_header   X-Forwarded-For;
real_ip_recursive on;

# Original external scheme is always HTTPS (Keenetic). If the proxy
# doesn't send X-Forwarded-Proto, default it to https so the app
# never thinks the request was plaintext.
map $http_x_forwarded_proto $jorasite_proto {
    default $http_x_forwarded_proto;
    ""      https;
}

# Rate-limit zones (per client IP). Applied selectively in the site block.
limit_req_zone $binary_remote_addr zone=jorasite_api:10m     rate=10r/s;
limit_req_zone $binary_remote_addr zone=jorasite_general:10m rate=30r/s;
limit_req_status 429;
