# ── HEAVY / jorasite — site server block ─────────────────────
# Installed to: /etc/nginx/sites-available/jorasite
# Symlinked into: /etc/nginx/sites-enabled/jorasite
# Single public entry point. TLS terminates on Keenetic; we serve HTTP.

upstream jorasite_app {
    server 127.0.0.1:3000;
    keepalive 16;
}

server {
    # Keenetic terminates the public TLS, then RE-ENCRYPTS to this backend
    # over HTTPS on :443 (verified from access logs). So we terminate TLS
    # here with a self-signed cert (Keenetic does not validate the backend
    # cert). Port 80 stays for LAN/healthcheck/local use.
    listen 80;
    listen [::]:80;
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name jorasite.girafi.keenetic.name;

    ssl_certificate     /etc/nginx/ssl/jorasite.crt;
    ssl_certificate_key /etc/nginx/ssl/jorasite.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:5m;
    ssl_session_timeout 1h;

    # Logs (predictable location; rotated by logrotate)
    access_log /var/log/nginx/jorasite.access.log;
    error_log  /var/log/nginx/jorasite.error.log;

    # Uploads/body: app only takes small JSON (CAPI). Keep modest.
    client_max_body_size 10m;

    # ── Security headers ──
    add_header X-Content-Type-Options    "nosniff"                    always;
    add_header X-Frame-Options           "SAMEORIGIN"                 always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
    # HSTS: TLS terminates on Keenetic — enable there. Example if proxied through:
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Allow only the methods the app uses ──
    if ($request_method !~ ^(GET|HEAD|POST)$) {
        return 405;
    }

    # ── Common proxy headers (preserve original client + scheme) ──
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $jorasite_proto;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header Connection        "";

    # ── API + tracking endpoints: rate-limited ──
    location /capi {
        limit_req zone=jorasite_api burst=20 nodelay;
        proxy_pass http://jorasite_app;
    }

    location /api/ {
        limit_req zone=jorasite_api burst=40 nodelay;
        # pCloud image downloads stream through here — allow time, don't buffer.
        proxy_read_timeout 300s;
        proxy_buffering off;
        proxy_pass http://jorasite_app;
    }

    location = /healthz {
        access_log off;
        proxy_pass http://jorasite_app;
    }

    # ── Everything else (static site + app) ──
    location / {
        limit_req zone=jorasite_general burst=60 nodelay;
        proxy_pass http://jorasite_app;
    }
}
